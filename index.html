<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>weather · aura pro</title>
  <!-- ========== style.css ========== -->
  <link rel="stylesheet" href="style.css">
  <!-- Font Awesome 6 (icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <!-- ========== index.html ========== -->
  <div class="card" id="weatherCard">
    <!-- header: dynamic greeting + location trigger -->
    <div class="flex-row">
      <div class="greeting" id="greetingMsg"><i class="fas fa-sun"></i> good day</div>
      <div class="location-btn" id="currentLocationBtn" title="use my location">
        <i class="fas fa-location-arrow"></i>
      </div>
    </div>

    <!-- search row -->
    <div class="search-wrapper">
      <input type="text" class="input-field" id="cityInput" placeholder="search city ..." value="London" autocomplete="off">
      <div class="search-btn" id="searchBtn">
        <i class="fas fa-magnifying-glass"></i>
      </div>
    </div>

    <!-- main weather data will be injected here -->
    <div id="weatherContent">
      <div class="message-area"><i class="fas fa-spinner fa-pulse"></i> loading ...</div>
    </div>

    <!-- bottom tools: unit toggle & refresh -->
    <div class="bottom-tools">
      <div class="tool-chip" id="unitToggle">
        <i class="fas fa-temperature-high"></i> <span id="unitLabel">°C</span>
      </div>
      <div class="tool-chip" id="refreshBtn">
        <i class="fas fa-rotate"></i> refresh
      </div>
    </div>
    <div class="attribution">weather · aura pro</div>
  </div>

  <!-- ========== popup overlay (hidden by default) ========== -->
  <div class="popup-overlay" id="popupOverlay">
    <div class="popup-card" id="popupCard">
      <div class="popup-header">
        <span class="popup-title" id="popupTitle">Humidity details</span>
        <button class="popup-close" id="popupClose"><i class="fas fa-times"></i></button>
      </div>
      <div class="popup-content" id="popupContent">
        <!-- dynamic content will be inserted here -->
      </div>
    </div>
  </div>

  <!-- ========== script.js ========== -->
  <script src="script.js"></script>
</body>
</html>
